<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="logo1.png?v=1.1">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo2.png" type="image/x-icon">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>سندي - Sandy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --main-color: #008080; --orange-accent: #ff8c00; }
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; }
        .navbar-brand { position: absolute; top: 20px; right: 20px; z-index: 1000; }
        .logo-img { width: 90px; height: auto; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        
        /* تأثير الخلفية المتحركة */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); position: relative; overflow: hidden; }
        
        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; background: rgba(255, 255, 255, 0.1); border-radius: 50%; animation: float 15s infinite linear; }
        
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .btn-main { padding: 18px 45px; font-size: 1.3rem; border-radius: 12px; margin: 15px; border: none; font-weight: bold; transition: all 0.4s ease; text-transform: uppercase; letter-spacing: 1px; z-index: 10; }
        .btn-order { background: linear-gradient(45deg, var(--main-color), #2dd4bf); color: white; box-shadow: 0 10px 20px rgba(0, 128, 128, 0.3); }
        .btn-order:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0, 128, 128, 0.5); }
        .btn-complaint { background: transparent; border: 2px solid #ef4444; color: #ef4444; }
        .btn-complaint:hover { background: #ef4444; color: white; transform: translateY(-5px); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); z-index: 10; }
        .form-control { background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .form-control:focus { background: rgba(255,255,255,0.2); color: white; box-shadow: 0 0 10px var(--main-color); }
        .payment-box { background: rgba(255, 140, 0, 0.1); border: 1px dashed var(--orange-accent); border-radius: 15px; padding: 15px; margin-top: 20px; color: var(--orange-accent); }
        
        /* ستايل النيون للسوشيال ميديا */
        .neon-icon { display: inline-block; margin: 0 15px; transition: all 0.3s ease; }
        .neon-icon:hover { transform: translateY(-5px) scale(1.1); }
        .neon-icon:active { transform: scale(0.9); }
        .fb:hover { filter: drop-shadow(0 0 15px #1877F2); }
        .ig:hover { filter: drop-shadow(0 0 15px #E4405F); }
        .tk:hover { filter: drop-shadow(0 0 15px #ffffff); }

        /* اللوجو الرئيسي مكبر وتأثير نيون */
        .main-logo-hero { width: 220px; height: auto; margin-bottom: 40px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); z-index: 10; animation: pulse-logo 4s infinite ease-in-out; }
        @keyframes pulse-logo { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 35px rgba(255,255,255,0.6)); } }

        /* ستايل صفحة من نحن - مضاف جديد */
        .sandy-bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80vh;
            background: #1e293b; border-top: 4px solid var(--orange-accent);
            border-radius: 30px 30px 0 0; z-index: 9999;
            transition: bottom 0.5s ease; padding: 20px; direction: rtl;
        }
        .sandy-bottom-sheet.active { bottom: 0; }
        .profile-wrapper { position: relative; width: 160px; height: 160px; margin: -50px auto 20px; }
        .gear-bg { 
            position: absolute; width: 100%; height: 100%; background: var(--main-color); 
            clip-path: polygon(50% 0%, 57% 5%, 62% 1%, 68% 7%, 75% 5%, 79% 13%, 87% 12%, 89% 21%, 97% 22%, 96% 31%, 100% 35%, 98% 44%, 100% 50%, 98% 56%, 100% 65%, 96% 69%, 97% 78%, 89% 79%, 87% 88%, 79% 87%, 75% 95%, 68% 93%, 62% 99%, 57% 95%, 50% 100%, 43% 95%, 38% 99%, 32% 93%, 25% 95%, 21% 87%, 13% 88%, 11% 79%, 3% 78%, 4% 69%, 0% 65%, 2% 56%, 0% 50%, 2% 44%, 0% 35%, 4% 31%, 3% 22%, 11% 21%, 13% 12%, 21% 13%, 25% 5%, 32% 7%, 38% 1%, 43% 5%);
            animation: rotateGear 10s linear infinite; z-index: 1;
        }
        .user-photo { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 110%; z-index: 3; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        @keyframes rotateGear { from { transform: rotate(0); } to { transform: rotate(360deg); } }
        .btn-about { background: transparent; border: 2px solid var(--orange-accent); color: var(--orange-accent); }
        .btn-about:hover { background: var(--orange-accent); color: white; transform: translateY(-5px); }
    </style>
</head>
<body>

    <a id="topLogo" class="navbar-brand d-none" href="#"><img src="logo.png" alt="Sanade Logo" class="logo-img"></a>

    <div id="mainView" class="hero">
        <div class="particles" id="particles"></div>
        
        <img src="logo.png" alt="Sandy Logo" class="main-logo-hero">
        
        <div class="d-flex flex-wrap justify-content-center">
            <button class="btn btn-main btn-order" onclick="handleAction('order')">احجز طلب صيانة</button>
            <button class="btn btn-main btn-complaint" onclick="handleAction('complaint')">تقديم شكوى</button>
            <button class="btn btn-main btn-about" onclick="toggleAbout(true)">من نحن؟</button>
        </div>

        <div style="position: absolute; bottom: 20px; text-align: center; width: 100%; z-index: 10;">
            <div style="margin-bottom: 10px;">
                <a href="#" target="_blank" class="neon-icon fb">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" width="30" height="30" alt="Facebook">
                </a>
                <a href="#" target="_blank" class="neon-icon ig">
                    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" width="30" height="30" alt="Instagram">
                </a>
                <a href="#" target="_blank" class="neon-icon tk">
                    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" width="30" height="30" alt="TikTok">
                </a>
            </div>
            <div style="font-size: 0.9rem; opacity: 0.6;">سندي - Sandy 2026</div>
        </div>
    </div>

    <!-- صفحة من نحن المضافة -->
    <div id="aboutSheet" class="sandy-bottom-sheet">
        <div style="width: 50px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 30px; cursor: pointer;" onclick="toggleAbout(false)"></div>
        <div class="profile-wrapper">
            <div class="gear-bg"></div>
            <img src="s7s.png" class="user-photo">
        </div>
        <div class="text-center px-3">
            <h4 style="color: var(--orange-accent); font-weight: 700; margin-bottom: 15px;">سندي.. الفكر الهندسي خلف الإنجاز</h4>
            <p id="aboutStory" style="color: #cbd5e1; line-height: 1.8; text-align: justify; height: 150px; overflow-y: auto;"></p>
            <button class="btn btn-outline-light btn-sm mt-3" style="border-radius: 20px; padding: 5px 30px;" onclick="toggleAbout(false)">إغلاق</button>
        </div>
    </div>

    <div id="authContainer" class="hero d-none">
        <div class="glass-card text-center" style="width: 90%; max-width: 400px;">
            <h3 class="mb-4">إنشاء حساب جديد</h3>
            <input type="text" id="regName" class="form-control" placeholder="الاسم بالكامل">
            <input type="tel" id="regPhone" class="form-control" placeholder="رقم الموبايل">
            <button class="btn btn-order w-100" onclick="registerUser()">تسجيل والدخول</button>
        </div>
    </div>

    <div id="formContainer" class="hero d-none">
        <div class="glass-card" style="width: 90%; max-width: 500px;">
            <h3 id="formTitle" class="text-center mb-4"></h3>
            <form id="requestForm">
                <div class="mb-3">
                    <label class="small opacity-75">مرحباً: <span id="userNameDisplay" class="text-info"></span></label>
                </div>
                <div id="addressFieldArea"></div>
                <textarea id="issueDetail" class="form-control mb-3" rows="4" placeholder="اشرح لنا المشكلة بالتفصيل..." required></textarea>
                <div id="paymentArea" class="payment-box d-none text-center">
                    <h6>وسيلة الدفع (فودافون كاش / إنستا باي)</h6>
                    <h5 class="fw-bold">01090144852</h5>
                </div>
                <button type="submit" class="btn btn-order w-100 mt-4">تأكيد الإرسال</button>
                <button type="button" class="btn btn-sm btn-link text-white opacity-50 w-100 mt-2" onclick="location.reload()">إلغاء</button>
            </form>
        </div>
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 5 + 2 + 'px';
            particle.style.width = size;
            particle.style.height = size;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.opacity = Math.random();
            particlesContainer.appendChild(particle);
        }

        const firebaseConfig = {
            databaseURL: "https://sandy-66c02-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userData = JSON.parse(localStorage.getItem('sanadeUser'));
        let currentAction = '';

        function toggleAbout(show) {
            const sheet = document.getElementById('aboutSheet');
            const el = document.getElementById('aboutStory');
            if(show) {
                sheet.classList.add('active');
                const text = `أنا المهندس حسين، مؤسس منصة "سندي". المنصة ولدت من رؤية تهدف لدمج الدقة الهندسية مع احتياجات خدمات الصيانة. نحن نؤمن أن التكنولوجيا هي "السند" الحقيقي لضمان جودة العمل وراحة العميل. سندي.. احترافية في كل طلب.`;
                let i = 0; el.innerHTML = "";
                function type() { if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 30); } }
                setTimeout(type, 500);
            } else { sheet.classList.remove('active'); }
        }

        function handleAction(action) {
            currentAction = action;
            if (!userData) {
                document.getElementById('mainView').classList.add('d-none');
                document.getElementById('authContainer').classList.remove('d-none');
                document.getElementById('topLogo').classList.remove('d-none');
            } else { showForm(); }
        }

        function registerUser() {
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            if (name && phone.length >= 11) {
                userData = { name, phone };
                localStorage.setItem('sanadeUser', JSON.stringify(userData));
                showForm();
            } else { alert("يرجى إدخال البيانات كاملة بشكل صحيح"); }
        }

        function showForm() {
            document.getElementById('mainView').classList.add('d-none');
            document.getElementById('authContainer').classList.add('d-none');
            document.getElementById('formContainer').classList.remove('d-none');
            document.getElementById('topLogo').classList.remove('d-none');
            document.getElementById('userNameDisplay').innerText = userData.name;
            document.getElementById('formTitle').innerText = currentAction === 'order' ? 'طلب صيانة' : 'شكوى';
            const addressArea = document.getElementById('addressFieldArea');
            if(currentAction === 'order') {
                addressArea.innerHTML = `<input type="text" id="userAddress" class="form-control mb-3" placeholder="العنوان بالتفصيل" required>`;
                document.getElementById('paymentArea').classList.remove('d-none');
            } else {
                addressArea.innerHTML = '';
                document.getElementById('paymentArea').classList.add('d-none');
            }
        }

        document.getElementById('requestForm').onsubmit = function(e) {
            e.preventDefault();
            const addressVal = document.getElementById('userAddress') ? document.getElementById('userAddress').value : 'غير محدد';
            const newRequest = {
                userName: userData.name,
                userPhone: userData.phone,
                userAddress: addressVal, 
                type: currentAction,
                detail: document.getElementById('issueDetail').value,
                status: 'pending',
                time: new Date().toLocaleString('ar-EG')
            };
            db.ref('requests').push(newRequest).then(() => {
                alert("تم استلام طلبك بنجاح، انتظر تواصلنا معك.");
                location.reload();
            }).catch((error) => { alert("حدث خطأ في الإرسال."); });
        };
    </script>
</body>
</html>
